---
layout: default
---

{% if page.content_bg_image %}
<div id="splash-screen" class="splash-screen" style="background: center / cover no-repeat url({{ page.content_bg_image | relative_url }});">
</div>
{% endif %}

<article class="page">
  <h1 class="page-title">{{ page.title }}</h1>
  {{ content }}
</article>

{% if page.content_bg_image %}
<style>
  .splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  @media (min-width: 48rem) {
    .splash-screen {
      left: 25%;
      width: 75%;
    }
  }
</style>
<script>
  (function() {
    var splash = document.getElementById('splash-screen');
    setTimeout(function() {
      splash.style.opacity = '0';
      splash.style.visibility = 'hidden';
      setTimeout(function() {
        splash.remove();
      }, 800);
    }, 5000);
  })();
</script>
{% endif %}
